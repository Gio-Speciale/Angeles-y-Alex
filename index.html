<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#d9b6ad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angeles y Alex</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta property="og:title" content="Angeles y Alex">
    <meta property="og:description" content="¡Te invitamos a celebrar nuestra boda!">
    <meta property="og:image" content="https://gio-speciale.github.io/Angeles-y-Alex/preview.jpg">
    <meta property="og:type" content="website">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body { opacity: 0; transition: opacity 0.5s ease; font-family: 'Book Antiqua', 'Georgia', serif; color: #705E5E; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; }
        #invitacion { background: url('fondo-estatico.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .reloj-container { display: flex; justify-content: center; gap: 4px; margin: 15px 0; }
        .flip-box { border: 1px solid #705E5E; color: #705E5E; padding: 2px; border-radius: 2px; text-align: center; width: 26px; }
        .flip-box span { display: block; font-size: 12px; font-weight: bold; }
        .flip-box label { font-size: 6px; text-transform: uppercase; }
        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.015); } 100% { transform: scale(1); } }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .boton-ubicacion { animation: latido 2s infinite ease-in-out; }
        #contenedor-sobre { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; transition: opacity 1s ease; background-color: #fff; }
        #sobre { width: 100%; height: 100%; background: url('sobre-cerrado.png') no-repeat center center; background-size: cover; cursor: pointer; animation: pulso 5s infinite ease-in-out; }
        .seccion { width: 100vw; }
        img { width: 100vw; height: auto; display: block; }
        #btnAudio { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; cursor: pointer; z-index: 1000; opacity: 0.6; }
        
        /* Ajustes de Carrusel 16:9 y Coverflow */
        .swiper-slide { 
            width: 70%; 
            aspect-ratio: 16 / 9; 
            transition: all 0.5s; 
            cursor: pointer;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide-img, .slide-video { width: 100%; height: 100%; object-fit: cover; }
        .slide-video { display: none; }
        
      .play-icon {
            position: absolute;
            top: 40%;
            left: 40%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
            animation: latido 2s infinite ease-in-out;
            /* CORRECCIONES PARA EL CENTRADO REAL: */
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 5px; /* Compensa el peso visual del símbolo ▶ */
            width: 48px;
            height: 48px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="contenedor-sobre">
        <div id="sobre"></div>
        <div style="position: absolute; top: 32%; width: 100%; display: flex; justify-content: center; pointer-events: none;">
            <lottie-player src="Arrow.json" background="transparent" speed="1" style="width: 80px; height: 80px;" loop autoplay></lottie-player>
        </div>
    </div>

    <div id="invitacion">
        <div class="seccion"><img src="imagen-1.png" alt="Sección 1"></div>
        <div style="display: flex; justify-content: center; margin: 20px 0;"><lottie-player src="anilloss.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></lottie-player></div>
        <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
        <div class="seccion"><img src="texto-1.png" alt="Texto 1"></div>
        <div style="display: flex; justify-content: center; margin: 20px 0;"><lottie-player src="anilloss.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></lottie-player></div>
        <div class="seccion"><img src="texto2.png" alt="Texto 2"></div>
        <div class="reloj-container" id="cuenta-regresiva">
            <div class="flip-box"><span id="dias">0</span><label>Días</label></div>
            <div class="flip-box"><span id="horas">0</span><label>Hrs</label></div>
            <div class="flip-box"><span id="minutos">0</span><label>Min</label></div>
            <div class="flip-box"><span id="segundos">0</span><label>Seg</label></div>
        </div>
        <div style="display: flex; justify-content: center; margin: 20px 0;"><lottie-player src="Wedding.json" background="transparent" speed="1" style="width: 85px; height: 85px;" loop autoplay></lottie-player></div>
        
        <div style="background-color: rgba(255, 255, 255, 0.5); padding: 25px 0; margin: 20px 0; width: 100%; backdrop-filter: blur(5px);">
            <h3 style="text-align: center; color: #705E5E; margin: 0 0 15px 0; font-family: 'Book Antiqua', serif; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Toca para ver la ubicación</h3>
            <div style="display: flex; justify-content: center; gap: 30px;">
                <a href="https://www.google.com/maps/place/Kil%C3%B3metro+0/@-16.4902709,-68.1437046,15.45z/data=!4m6!3m5!1s0x915f216340eecefd:0xac064cdee44eb6ab!8m2!3d-16.4959631!4d-68.1334156!16s%2Fg%2F11krs1sbsc?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="boton-ubicacion" style="text-decoration: none; color: #705E5E; border: 1px solid #705E5E; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; min-width: 80px;">⛪<br><span style="font-size: 9px;">CATEDRAL</span></a>
                <a href="https://www.google.com/maps/place/Sal%C3%B3n+de+Eventos+Green+Garden/@-16.4933943,-68.1992053,17z/data=!4m6!3m5!1s0x915edf006203fa57:0xc5ba724a5c0100b1!8m2!3d-16.4933573!4d-68.1969656!16s%2Fg%2F11x2wx2pqt?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="boton-ubicacion" style="text-decoration: none; color: #705E5E; border: 1px solid #705E5E; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; min-width: 80px;">🥂<br><span style="font-size: 9px;">SALÓN</span></a>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 50px; margin-bottom: 25px;">
            <h2 style="font-family: 'Book Antiqua', serif; color: #705E5E; font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px;">
                NUESTRA CARTELERA MUSICAL
            </h2>
            <div style="height: 1px; width: 60px; background-color: #705E5E; margin: 0 auto;"></div>
        </div>
        
        <div class="swiper mySwiper" style="width: 100%; padding: 50px 0; margin-top: 30px;">
            <div class="swiper-wrapper">
                <div class="swiper-slide" onclick="playCarouselVideo(this)"><span class="play-icon">▶</span><img src="port-1.jpg" class="slide-img"><video class="slide-video" src="video-1.mp4" loop playsinline></video></div>
                <div class="swiper-slide" onclick="playCarouselVideo(this)"><span class="play-icon">▶</span><img src="port-2.jpg" class="slide-img"><video class="slide-video" src="video-2.mp4" loop playsinline></video></div>
                <div class="swiper-slide" onclick="playCarouselVideo(this)"><span class="play-icon">▶</span><img src="port-3.jpg" class="slide-img"><video class="slide-video" src="video-3.mp4" loop playsinline></video></div>
                <div class="swiper-slide" onclick="playCarouselVideo(this)"><span class="play-icon">▶</span><img src="port-1.jpg" class="slide-img"><video class="slide-video" src="video-1.mp4" loop playsinline></video></div>
                <div class="swiper-slide" onclick="playCarouselVideo(this)"><span class="play-icon">▶</span><img src="port-2.jpg" class="slide-img"><video class="slide-video" src="video-2.mp4" loop playsinline></video></div>
                <div class="swiper-slide" onclick="playCarouselVideo(this)"><span class="play-icon">▶</span><img src="port-3.jpg" class="slide-img"><video class="slide-video" src="video-3.mp4" loop playsinline></video></div>
            </div>
        </div>
    </div>

    <div id="btnAudio"><lottie-player id="lottieMusic" src="Music.json" background="transparent" speed="1" style="width: 100%; height: 100%;" loop autoplay></lottie-player></div>
    <audio id="musicaFondo" loop><source src="fondo-1.mp3" type="audio/mpeg"></audio>

    <script>
        window.onload = function() { document.body.style.opacity = '1'; };
        const fechaDestino = new Date("Nov 28, 2026 13:00:00").getTime();
        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaDestino - ahora;
            document.getElementById("dias").innerHTML = Math.floor(distancia / (1000 * 60 * 60 * 24));
            document.getElementById("horas").innerHTML = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutos").innerHTML = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("segundos").innerHTML = Math.floor((distancia % (1000 * 60)) / 1000);
        }, 1000);

        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        var lottieMusic = document.getElementById("lottieMusic");
        var contenedorSobre = document.getElementById("contenedor-sobre");
        audio.volume = 0.3;

        contenedorSobre.onclick = function() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            audio.play();
            contenedorSobre.style.opacity = '0';
            setTimeout(() => { contenedorSobre.style.display = 'none'; }, 1000);
        };

        btn.onclick = function() {
            if (audio.paused) { audio.play(); lottieMusic.play(); btn.style.opacity = '0.6'; }
            else { audio.pause(); lottieMusic.pause(); btn.style.opacity = '0.3'; }
        };

        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            loop: true,
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 200,
                modifier: 1,
                slideShadows: true
            }
        });

        function playCarouselVideo(slide) {
            let img = slide.querySelector('.slide-img');
            let video = slide.querySelector('.slide-video');
            let playIcon = slide.querySelector('.play-icon');
            
            if (video.style.display === 'block') {
                video.paused ? video.play() : video.pause();
            } else {
                audio.pause();
                document.querySelectorAll('.play-icon').forEach(p => p.style.display = 'block');
                playIcon.style.display = 'none';
                document.querySelectorAll('.slide-video').forEach(v => { v.style.display = 'none'; v.pause(); });
                document.querySelectorAll('.slide-img').forEach(i => i.style.display = 'block');
                img.style.display = 'none';
                video.style.display = 'block';
                video.play();
            }
        }
        window.addEventListener('load', function() {
        setTimeout(function() {
            var firma = document.getElementById('firma-gio');
            if (firma) {
                firma.style.opacity = '0.6';
            }
        }, 10000); //  = 10 segundos
    });
    </script>
    <div id="firma-gio" style="text-align: center; font-size: 8px; color: #705E5E; opacity: 0; transition: opacity 1.5s ease; margin: 15px auto 10px auto; padding-top: 8px; width: 80%; border-top: 1px solid rgba(112, 94, 94, 0.3); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 0.5px;">Realizamos todo tipo de invitaciones digitales, cotiza el tuyo al 777 97 87 3 GioSpeciale</div>
</body>
</html>
