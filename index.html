<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#d9b6ad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angeles y Alex</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { opacity: 0; transition: opacity 0.5s ease; font-family: 'Book Antiqua', serif; color: #705E5E; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; }
        #invitacion { background: url('fondo-estatico.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .seccion img { width: 100vw; height: auto; display: block; }
        #contenedor-sobre { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; background-color: #fff; }
        #sobre { width: 100%; height: 100%; background: url('sobre-cerrado.png') no-repeat center center; background-size: cover; cursor: pointer; }
        #btnAudio { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; cursor: pointer; z-index: 1000; opacity: 0.6; }
        
        /* Estilos del Carrusel */
        .swiper { width: 100%; padding: 50px 0; }
        .swiper-slide { width: 300px; height: 300px; background-position: center; background-size: cover; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .slide-img, .slide-video { width: 100%; height: 100%; object-fit: cover; }
        .slide-video { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="contenedor-sobre">
        <div id="sobre"></div>
    </div>

    <div id="invitacion">
        <div class="seccion"><img src="imagen-1.png" alt="Sección 1"></div>
        <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
        <div class="seccion"><img src="texto-1.png" alt="Texto 1"></div>
        <div class="seccion"><img src="texto2.png" alt="Texto 2"></div>

        <!-- CARRUSEL 3D -->
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide" onclick="playVideo(this)"><img src="port-1.jpg" class="slide-img"><video class="slide-video" src="video 1.mp4" playsinline loop></video></div>
                <div class="swiper-slide" onclick="playVideo(this)"><img src="port-2.jpg" class="slide-img"><video class="slide-video" src="video 2.mp4" playsinline loop></video></div>
                <div class="swiper-slide" onclick="playVideo(this)"><img src="port-3.jpg" class="slide-img"><video class="slide-video" src="video 3.mp4" playsinline loop></video></div>
            </div>
        </div>
    </div>

    <div id="btnAudio"><lottie-player id="lottieMusic" src="Music.json" style="width: 100%; height: 100%;" loop autoplay></lottie-player></div>
    <audio id="musicaFondo" loop><source src="fondo-1.mp3" type="audio/mpeg"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        window.onload = function() { document.body.style.opacity = '1'; };
        
        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow", grabCursor: true, centeredSlides: true, slidesPerView: "auto",
            coverflowEffect: { rotate: 50, stretch: 0, depth: 100, modifier: 1, slideShadows: true }
        });

        function playVideo(slide) {
            let img = slide.querySelector('.slide-img');
            let video = slide.querySelector('.slide-video');
            if(video.style.display === 'none') {
                img.style.display = 'none';
                video.style.display = 'block';
                video.play();
            } else {
                video.paused ? video.play() : video.pause();
            }
        }

        // Lógica de audio y sobre
        var audio = document.getElementById("musicaFondo");
        document.getElementById("contenedor-sobre").onclick = function() {
            audio.play();
            document.getElementById("contenedor-sobre").style.opacity = '0';
            setTimeout(() => { document.getElementById("contenedor-sobre").style.display = 'none'; }, 1000);
        };
    </script>
</body>
</html>
