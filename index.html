<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angeles y Alex</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { opacity: 0; transition: opacity 0.5s ease; font-family: 'Book Antiqua', serif; margin: 0; background: url('fondo-estatico.jpg') no-repeat center center fixed; background-size: cover; }
        #contenedor-sobre { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 2000; background:#fff; transition: opacity 1s; }
        #sobre { width: 100%; height: 100%; background: url('sobre-cerrado.png') no-repeat center; background-size: cover; cursor: pointer; animation: pulso 5s infinite; }
        @keyframes pulso { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .boton-ubicacion { animation: latido 2s infinite; text-decoration: none; color: #705E5E; border: 1px solid; padding: 10px; border-radius: 8px; }
        
        .swiper { width: 100%; padding: 50px 0; }
        .swiper-slide { width: 300px; height: 300px; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .slide-img, .slide-video { width: 100%; height: 100%; object-fit: cover; }
        .slide-video { display: none; }
        #btnAudio { position: fixed; bottom: 20px; left: 20px; width: 45px; z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="contenedor-sobre"><div id="sobre"></div></div>

    <div id="invitacion" style="display:flex; flex-direction:column; align-items:center;">
        <img src="imagen-1.png" style="width:100vw;">
        <lottie-player src="anilloss.json" style="width: 70px; height: 70px;" loop autoplay></lottie-player>
        <img src="imagen.png" style="width:100vw;">
        <img src="texto-1.png" style="width:100vw;">
        <lottie-player src="anilloss.json" style="width: 70px; height: 70px;" loop autoplay></lottie-player>
        <img src="texto2.png" style="width:100vw;">
        
        <!-- Ubicaciones -->
        <div style="display:flex; gap:20px; margin:20px;">
            <a href="#" class="boton-ubicacion">CATEDRAL</a>
            <a href="#" class="boton-ubicacion">SALÓN</a>
        </div>

        <!-- CARRUSEL -->
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide" onclick="playVideo(this)"><img src="port-1.jpg" class="slide-img"><video class="slide-video" src="video 1.mp4" playsinline loop></video></div>
                <div class="swiper-slide" onclick="playVideo(this)"><img src="port-2.jpg" class="slide-img"><video class="slide-video" src="video 2.mp4" playsinline loop></video></div>
                <div class="swiper-slide" onclick="playVideo(this)"><img src="port-3.jpg" class="slide-img"><video class="slide-video" src="video 3.mp4" playsinline loop></video></div>
            </div>
        </div>
    </div>

    <div id="btnAudio"><lottie-player id="lottieMusic" src="Music.json" style="width:100%;" loop autoplay></lottie-player></div>
    <audio id="musicaFondo" loop><source src="fondo-1.mp3" type="audio/mpeg"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        window.onload = () => document.body.style.opacity = '1';
        var audio = document.getElementById("musicaFondo");
        
        // Carrusel
        var swiper = new Swiper(".mySwiper", { effect: "coverflow", centeredSlides: true, slidesPerView: "auto", coverflowEffect: { slideShadows: true } });

        function playVideo(slide) {
            // Pausar música al tocar video
            audio.pause();
            
            // Pausar otros videos y reproducir el actual
            document.querySelectorAll('.slide-video').forEach(v => { if(v !== slide.querySelector('.slide-video')) v.pause(); });
            
            let img = slide.querySelector('.slide-img');
            let video = slide.querySelector('.slide-video');
            img.style.display = 'none';
            video.style.display = 'block';
            video.play();
        }

        document.getElementById("contenedor-sobre").onclick = () => {
            audio.play();
            document.getElementById("contenedor-sobre").style.opacity = '0';
            setTimeout(() => document.getElementById("contenedor-sobre").style.display = 'none', 1000);
        };
    </script>
</body>
</html>
